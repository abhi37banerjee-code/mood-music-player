<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Music Player</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 120px; /* Space for the bottom player */
        }

        /* Header */
        .header {
            text-align: center;
            margin: 50px 20px 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }
        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Mood Selection */
        .mood-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            max-width: 800px;
        }
        
        .mood-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 30px;
            font-size: 1rem;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .mood-btn:hover, .mood-btn.active {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* Playlist Section */
        .playlist-section {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .playlist-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            text-transform: capitalize;
            display: none;
        }
        .song-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .song-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            background: var(--surface);
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .song-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border);
        }
        .song-item.playing {
            border-left: 4px solid #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }
        .song-icon {
            margin-right: 15px;
            opacity: 0.5;
        }

        /* Fixed Bottom Player */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }
        #now-playing {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        audio {
            width: 100%;
            max-width: 600px;
            height: 40px;
            outline: none;
        }
        
        /* Customizing the default audio player slightly */
        audio::-webkit-media-controls-panel {
            background-color: var(--surface);
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>MOOD</h1>
        <p>SELECT YOUR VIBE. CHOOSE YOUR TRACK.</p>
    </div>

    <div class="mood-container">
        <button class="mood-btn" onclick="loadPlaylist('happy', this)">Happy</button>
        <button class="mood-btn" onclick="loadPlaylist('sad', this)">Sad</button>
        <button class="mood-btn" onclick="loadPlaylist('party', this)">Party</button>
        <button class="mood-btn" onclick="loadPlaylist('chill', this)">Chill</button>
    </div>

    <div class="playlist-section">
        <div class="playlist-title" id="playlist-title">Select a mood to view tracks</div>
        <ul class="song-list" id="song-list">
            <!-- Songs will appear here manually -->
        </ul>
    </div>

    <div class="player-bar">
        <div id="now-playing">Not Playing</div>
        <audio id="audio-player" controls>
            Your browser does not support the audio element.
        </audio>
    </div>

    <script>
        // =====================================================================
        // 🛑 ADD YOUR 30 SONGS PER MOOD HERE
        // Keep the quotes. Separate with commas. Don't put a comma on the last one.
        // =====================================================================

        const playlists = {
            happy: [
                "Bairan.mp3",
                "happy_song_2.mp3",
                "happy_song_3.mp3"
            ],
            sad: [
                "sad_song_1.mp3",
                "sad_song_2.mp3",
                "sad_song_3.mp3"
            ],
            party: [
                "party_song_1.mp3",
                "party_song_2.mp3",
                "party_song_3.mp3"
            ],
            chill: [
                "chill_song_1.mp3",
                "chill_song_2.mp3",
                "chill_song_3.mp3"
            ]
        };

        // =====================================================================
        // LOGIC FOR MANUAL SELECTION & UI (DO NOT TOUCH)
        // =====================================================================

        const audioPlayer = document.getElementById('audio-player');
        const nowPlayingText = document.getElementById('now-playing');
        const songListContainer = document.getElementById('song-list');
        const playlistTitle = document.getElementById('playlist-title');
        let currentPlayingItem = null;

        function loadPlaylist(mood, buttonElement) {
            // Update active button styling
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            // Show title
            playlistTitle.style.display = 'block';
            playlistTitle.innerText = `${mood.toUpperCase()} VIBES`;

            // Clear current list
            songListContainer.innerHTML = '';
            
            const songs = playlists[mood];

            if (songs.length === 0 || songs[0] === "") {
                songListContainer.innerHTML = '<li class="song-item">No tracks uploaded yet.</li>';
                return;
            }

            // Generate list items manually
            songs.forEach((songFile) => {
                const li = document.createElement('li');
                li.className = 'song-item';
                
                // Format the display name (remove .mp3 and underscores)
                const displayName = songFile.replace('.mp3', '').replace(/_/g, ' ');

                li.innerHTML = `<span class="song-icon">▶</span> ${displayName}`;
                
                // Click to play manually
                li.onclick = () => playSong(songFile, displayName, li);
                
                songListContainer.appendChild(li);
            });
        }

        function playSong(file, displayName, listItem) {
            // Remove highlight from previous playing song
            if (currentPlayingItem) {
                currentPlayingItem.classList.remove('playing');
            }
            
            // Highlight the clicked song
            listItem.classList.add('playing');
            currentPlayingItem = listItem;

            // Update player and text
            audioPlayer.src = file;
            nowPlayingText.innerText = `PLAYING: ${displayName.toUpperCase()}`;
            
            // Play
            audioPlayer.play();
        }
    </script>

</body>
</html>
